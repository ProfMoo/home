---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# GitHub App PEM lives in the Bitwarden item's Notes field (preserves newlines).
# Hidden custom fields flatten multiline strings on some BW clients, so Notes is safer.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name renovate-bot-pem
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-notes
  target:
    name: *name
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: 30af3d67-f5a7-410a-bf72-b439001a4b8e
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/generators.external-secrets.io/githubaccesstoken_v1alpha1.json
# Mints short-lived installation token from the App PEM above
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: renovate-bot-auth-token
spec:
  appID: "906155"
  installID: "51165827"
  auth:
    privateKey:
      secretRef:
        name: renovate-bot-pem
        key: private_key_pem
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Final secret consumed by RenovateJob.spec.secretRef
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name renovate-bot-auth-token
spec:
  refreshInterval: 30m
  target:
    name: *name
    template:
      type: Opaque
      engineVersion: v2
      data:
        GITHUB_COM_TOKEN: "{{ .token }}"
        GITHUB_COM_USER: robottoms-up
        RENOVATE_TOKEN: "{{ .token }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: renovate-bot-auth-token
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Docker Hub creds for Renovate dependency lookups against docker.io
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name docker-hub-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: *name
    template:
      data:
        DOCKERHUB_USERNAME: "{{ .DOCKERHUB_USERNAME }}"
        DOCKERHUB_TOKEN: "{{ .DOCKERHUB_TOKEN }}"
  data:
    - secretKey: DOCKERHUB_USERNAME
      remoteRef:
        key: 3e3e1318-f784-47d4-b0ee-b4390011712a
        property: DOCKERHUB_USERNAME
    - secretKey: DOCKERHUB_TOKEN
      remoteRef:
        key: 3e3e1318-f784-47d4-b0ee-b4390011712a
        property: DOCKERHUB_TOKEN
