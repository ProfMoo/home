---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  values:
    drivers:
      cephfs:
        enabled: true
        kernelMountOptions:
          ms_mode: prefer-crc
        name: storage.cephfs.csi.ceph.com
        snapshotPolicy: volumeSnapshot
      nfs:
        enabled: false
      nvmeof:
        enabled: false
      rbd:
        enabled: true
        name: storage.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot
