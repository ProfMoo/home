---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy: ["alertname", "job"]
    groupInterval: 10m
    groupWait: 1m
    receiver: "null"
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: "="
      - receiver: heartbeat
        groupInterval: 5m
        groupWait: 0s
        repeatInterval: 5m
        matchers:
          - name: alertname
            value: Watchdog
            matchType: "="
      - receiver: ntfy
        matchers:
          - name: severity
            value: critical
            matchType: "="
  inhibitRules:
    - equal: ["alertname", "namespace"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: "="
      targetMatch:
        - name: severity
          value: warning
          matchType: "="
  receivers:
    - name: "null"
    # A heartbeat check (can be any service that knows how to handle heartbeat check-ins).
    # I use healthchecks.io because it was simple.
    # https://healthchecks.io/checks/1922b045-a436-413c-b06a-9e67e6fa5a64/details/
    - name: heartbeat
      webhookConfigs:
        - urlSecret:
            name: &secret alertmanager-secret
            key: ALERTMANAGER_HEARTBEAT_URL
    - name: ntfy
      webhookConfigs:
        - url: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
          httpConfig:
            basicAuth:
              username:
                name: *secret
                key: ALERTMANAGER_NTFY_WEBHOOK_USERNAME
              password:
                name: *secret
                key: ALERTMANAGER_NTFY_WEBHOOK_PASSWORD
