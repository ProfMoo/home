---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      ntfy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: binwiederhier/ntfy
              tag: v2.25.0@sha256:cfbbb1bac9196cb711e29ef0ac4adaeb033be6235f1df857705dc39c14384a1d
            args:
              - serve
            env:
              TZ: America/New_York
              NTFY_BASE_URL: https://alerts.drmoo.io
              NTFY_BEHIND_PROXY: "true"
              NTFY_LISTEN_HTTP: :8080
              NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: ntfy
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      external:
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
        hostnames:
          - alerts.drmoo.io
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/instance: homepage-external
          gethomepage.dev/name: Alerts
          gethomepage.dev/description: Push notifications
          gethomepage.dev/group: Infrastructure
          gethomepage.dev/icon: mdi-bell-ring
          gethomepage.dev/app: ntfy
    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /var/cache/ntfy
