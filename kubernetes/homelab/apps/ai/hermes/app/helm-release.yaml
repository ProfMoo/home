---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data
                cp /run/config/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            args:
              - gateway
              - run
            env:
              TZ: America/New_York
              API_SERVER_ENABLED: true
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &port 8642
              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_BASIC_AUTH_USERNAME: admin
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_PORT: &dashboardPort 9119
              HERMES_DASHBOARD_PUBLIC_URL: https://hermes.drmoo.io
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TERM: xterm-256color
            envFrom:
              - secretRef:
                  name: hermes-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: hermes
        ports:
          http:
            port: *dashboardPort
          agent:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/instance: homepage-internal
          gethomepage.dev/description: Nous Hermes agent
          gethomepage.dev/group: Home
          gethomepage.dev/icon: mdi-robot-outline
          gethomepage.dev/name: Hermes
          gethomepage.dev/app: hermes
        hostnames:
          - hermes.drmoo.io
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: hermes
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: hermes-configmap
        defaultMode: 0o755
        advancedMounts:
          hermes:
            init:
              - path: /run/config/config.yaml
                subPath: config.yaml
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
