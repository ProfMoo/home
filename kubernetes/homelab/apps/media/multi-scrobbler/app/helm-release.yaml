---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multi-scrobbler
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  # NOTE: More info on this Helm chart here: https://bjw-s.github.io/helm-charts/docs/common-library/
  # Multi-scrobbler docs: https://foxxmd.github.io/multi-scrobbler/docs/configuration
  values:
    controllers:
      multi-scrobbler:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/foxxmd/multi-scrobbler
              tag: 0.13.3@sha256:aecbf754a18c2ddc5d9bcf6385316a63aeae685f4106e76c25ab9d2c26c0f550
            envFrom:
              - secretRef:
                  name: multi-scrobbler-secret
            env:
              TZ: America/New_York
              BASE_URL: https://scrobbler.drmoo.io
              PORT: &port 9078
              LOG_LEVEL: info
              LASTFM_REDIRECT_URI: https://scrobbler.drmoo.io/lastfm/callback
              KOITO_URL: http://koito.media.svc.cluster.local
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
    service:
      app:
        controller: multi-scrobbler
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Music scrobbler aggregator
          gethomepage.dev/group: Media
          gethomepage.dev/icon: multi-scrobbler
          gethomepage.dev/name: Multi-Scrobbler
          gethomepage.dev/instance: homepage-internal
        hostnames:
          - "scrobbler.drmoo.io"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
    persistence:
      config:
        existingClaim: multi-scrobbler
        globalMounts:
          - path: /config
